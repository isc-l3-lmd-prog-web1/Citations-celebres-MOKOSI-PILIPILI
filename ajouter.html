<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajouter - Citations Célèbres</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; background:#f2f2f2; }
header, footer { background:#4a148c; color:white; text-align:center; padding:20px; }
nav { display:flex; justify-content:center; gap:15px; margin:10px 0; }
nav a { color:#4a148c; text-decoration:none; font-weight:bold; }
main { padding:20px; text-align:center; }
input, textarea { width:80%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#4a148c; color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; }
#liste { margin-top:20px; }
blockquote { font-style:italic; background:white; padding:10px; border-radius:5px; max-width:600px; margin:10px auto; }
@media(max-width:600px){ input, textarea{ width:95%; } }
</style>
</head>
<body>
<header>
<h1>Ajouter une Citation</h1>
</header>
<nav>
  <a href="index.html">Accueil</a>
  <a href="themes.html">Par Thème</a>
  <a href="auteurs.html">Par Auteur</a>
  <a href="ajouter.html">Ajouter</a>
  <a href="apropos.html">À propos</a>
</nav>
<main>
  <input type="text" id="auteur" placeholder="Nom de l'auteur">
  <textarea id="texte" placeholder="Votre citation"></textarea>
  <br>
  <button onclick="ajouterCitation()">Ajouter</button>
  <div id="liste"></div>
</main>
<footer>
  &copy; 2026 Citations Célèbres
</footer>
<script>
const liste = document.getElementById('liste');
function ajouterCitation(){
  const auteur = document.getElementById('auteur').value.trim();
  const texte = document.getElementById('texte').value.trim();
  if(auteur && texte){
    const block = document.createElement('blockquote');
    block.textContent = `"${texte}" - ${auteur}`;
    liste.appendChild(block);
    document.getElementById('auteur').value = '';
    document.getElementById('texte').value = '';
  } else {
    alert("Veuillez remplir auteur et citation !");
  }
}
</script>
</body>
</html>
